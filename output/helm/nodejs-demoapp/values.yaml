replicaCount: 2

image:
  repository: us-central1-docker.pkg.dev/scotiapoc-migration-demo/migration-demo/nodejs-demoapp
  tag: "4a04d97002aaeefd0d1254398f458e6a982fefd7"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: nodejs-demoapp.atlas.scotiabank.internal

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

redis:
  secretName: redis-secret
  hostKey: REDIS_SESSION_HOST

configMapName: app-config

podMonitor:
  enabled: true
  port: 3000
  path: /metrics

terminationGracePeriodSeconds: 60
