apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  PORT: {{ .Values.config.PORT | quote }}
  NODE_ENV: {{ .Values.config.NODE_ENV | quote }}
  {{- if .Values.config.REDIS_SESSION_HOST }}
  REDIS_SESSION_HOST: {{ .Values.config.REDIS_SESSION_HOST | quote }}
  {{- end }}
